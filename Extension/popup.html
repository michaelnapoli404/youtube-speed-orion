<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Speed Control Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, Helvetica Neue, sans-serif;
      background: #1c1c1e;
      color: #fff;
      padding: 18px 16px 20px;
      min-width: 240px;
      max-width: 300px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.85);
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    /* Preset buttons */
    .presets {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .preset {
      flex: 1;
      padding: 9px 4px;
      border-radius: 10px;
      background: #2c2c2e;
      border: 2px solid transparent;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .preset.active {
      border-color: #0a84ff;
      color: #0a84ff;
    }

    /* Custom input */
    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2c2c2e;
      border-radius: 10px;
      padding: 4px 12px;
      margin-bottom: 18px;
    }

    .custom-row label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    #maxSpeed {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-align: right;
      outline: none;
      width: 60px;
    }

    #maxSpeed::-webkit-inner-spin-button,
    #maxSpeed::-webkit-outer-spin-button { -webkit-appearance: none; }

    .unit {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }

    /* Save button */
    #save {
      width: 100%;
      padding: 11px;
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #save:active { opacity: 0.75; }

    #status {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      height: 14px;
      transition: opacity 0.3s;
    }

    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Speed Control</h2>

  <div class="section-label">Maximum Speed</div>

  <div class="presets">
    <button class="preset" data-value="5">5×</button>
    <button class="preset" data-value="10">10×</button>
    <button class="preset" data-value="16">16×</button>
  </div>

  <div class="custom-row">
    <label>Custom</label>
    <input type="number" id="maxSpeed" min="2" max="100" step="0.5" placeholder="10">
    <span class="unit">×</span>
  </div>

  <button id="save">Save</button>
  <div id="status"></div>

  <p class="hint">Double-tap the slider bar to reset to 1×.</p>

  <script src="popup.js"></script>
</body>
</html>
